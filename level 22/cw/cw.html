<!-- 1. რას აკეთებს html და რას აკეთებს css?
html - ქმნის თვითონ საიტის ჩონჩხს
css - უფრო ლამაზს ხდის საიტს
2. რა არის inline css?
inline - არის ცსსის ერთერთი მაგალითი. თეგში დაწერილი სტილის კოდი
3. რა არის internal css?
internal - სტილის კოდი სტილის თეგში
4. რა არის external css?
external - სულ სხვა ფაილიდან სტილის კოდი
5. inline css-ის გამოყენებით, შექმენით h1 თეგი და მიეცით მწვანე ფერის ტექსტი
6. intenral css–ის გამოყენებით, შექმენით p თეგი, ფერი იყოს ლურჯი, და უკანა ფონი იყოს ყვითელი
7. external css-ის გამოყენებით, შექმენით პატარა საიტი, სადაც იქნება ერთი სათაური, წინადადება და ფოტო, გამოიყენეთ ყველაფერი რაც დღეს ავხსენით, მოკლედ, რაზეც გინდათ იმაზე გააკეთეთ. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        p {
            color: blue;background-color: yellow;
        }
     </style>
</head>
<body>
    <h1 style="color: green;">Hello :D</h1>
    <p>Hello</p>
</body>
</html>
