    <!-- 1)კომენტარის სახით ახსენით რა css-ის გამოყენების ტექნიკები არსებობს (ასევე მათ შორის სხვაობა)
    ჩვენ ვისწავლეთ inline, internal, external ექსტერნალი ცალკე ფაილშია ინტერნალი სტილის თეგში იწერება ხოლო ინლაინი ცალკე ხაზზე
    2)კომენტარის სახით ახსენით internal და external css კოდის ანატომია (css rule / declaration...)
    internal, external - declaration = კუთვნილებები selector = გამოძახება თეგის სტილისთვის
    3)კომენტარის სახით ახსენით რატომ არის კარგი პრაქტიკა რომ გამოვიყენოთ external css
    დიდი დავალებებისთვის დიდ ადგილს არ იკავებს და საერთოდაც არ იკავებს ადგილს
    4)შექმენით 5 პარაგრაფი და ხუთივე გახადეთ წითელი, განალაგეთ ცენტრში, ფონის ფერი შეუცვალეთ შავად და ტექსტის ზომა გაზარდეთ 30 პიქსელამდე (inline css-ის გამოყენებით)

    5)HTML ფაილში: დაამატე სათაური (h1) დაამატე ორი პარაგრაფი (p) / გამოიყენე Internal CSS (style თეგის გამოყენებით head-ში) და შეცვალე:
    • პარაგრაფის ტექსტის ფერი (color)
    • პარაგრაფის ფონური ფერი (background-color)
    • heading-ის ტექსტის განლაგება (text-align)

    6)ვებსაიტზე დაამატე 5 პარაგრაფი, 2 bold თეგი, 1 image / (external cs-ის გამოყენებით) პირველი პარაგრაფის ფერი გახადე ლურჯი, ფონის ფერი ნაცრისფერი, ტექსტის ზომა 30px, დანარჩენი 4 პარაგრაფი გასტილე ისე როგორც გინდა / 2 bold თეგი გასტილე პირველი პარაგრაფის მსგავსად ხოლო ფოტო სიგანეში გახადე 300px / სიმაღლეში 200px -->
    <!-- 4 -->
    <p style="color:red; text-align: center;background-color: black;font-size:30px;">hi</p>
    <p style="color:red; text-align: center;background-color: black;font-size:30px;">hi</p>

    <p style="color:red; text-align: center;background-color: black;font-size:30px;">hi</p>
